<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BudgeOS — Bank verbinden</title>
  <!--
    Enable-Banking-Redirect-Ziel. Nach der Anmeldung bei der Bank landet der
    Nutzer hier mit ?code=…&state=…; diese Seite leitet per Deep-Link zurück in
    die App (budgeos://bank-callback). Statisch, kein Tracking, keine Secrets.
    → Deploy in das Site-Repo (egnhlz.github.io/budgeos-site/bank-callback.html)
    und exakt diese URL als Redirect-URI bei Enable Banking registrieren.
  -->
  <style>
    :root { color-scheme: light dark }
    body { margin: 0; min-height: 100dvh; display: grid; place-items: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #f4f5f8; color: #1a1b22; padding: 24px }
    .card { max-width: 360px; text-align: center; background: #fff;
      border: 1px solid rgba(0,0,0,.08); border-radius: 20px; padding: 32px 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,.08) }
    h1 { font-size: 22px; margin: 0 0 8px }
    p { opacity: .7; font-size: 15px; line-height: 1.5; margin: 0 0 20px }
    a.btn { display: inline-block; background: #6c5cff; color: #fff; text-decoration: none;
      font-weight: 600; padding: 12px 22px; border-radius: 12px }
    /* Folgt dem Geräte-/System-Theme (die Seite kennt das App-Theme nicht). */
    @media (prefers-color-scheme: dark) {
      body { background: #20212b; color: #fff }
      .card { background: rgba(255,255,255,.06); border-color: rgba(255,255,255,.12); box-shadow: none }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="title">Bank-Login abgeschlossen</h1>
    <p id="msg">Zurück zur App – sie schließt die Verbindung ab …</p>
    <a id="open" class="btn" href="#">App öffnen</a>
  </div>
  <script>
    (function () {
      var p = new URLSearchParams(location.search);
      var code = p.get('code');
      var state = p.get('state') || '';
      var err = p.get('error');
      var deep = 'budgeos://bank-callback?' +
        new URLSearchParams({ code: code || '', state: state, error: err || '' }).toString();
      document.getElementById('open').setAttribute('href', deep);
      if (err) {
        document.getElementById('title').textContent = 'Abgebrochen';
        document.getElementById('msg').textContent = 'Die Bank-Verbindung wurde nicht abgeschlossen. Du kannst die App öffnen und es erneut versuchen.';
      } else if (!code) {
        document.getElementById('title').textContent = 'Kein Code erhalten';
        document.getElementById('msg').textContent = 'Bitte in der App erneut versuchen.';
      } else {
        // Automatischer Deep-Link zurück in die App.
        location.href = deep;
      }
    })();
  </script>
</body>
</html>
